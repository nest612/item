# ItemsPlus fusionné - PMMP 5 + Customies
# Ce seul fichier configure maintenant :
# - les items basic (type: item)
# - les outils (type: tool)
# - les armures (type: armor)
# - les minerais, leurs textures, leurs drops et leur génération
# - les blocs normaux solides sans génération automatique
#
# DOSSIER UNIQUE : plugin_data/ItemsPlus/config.yml
# L'ancien plugin_data/MineraisPlus/config.yml est importé automatiquement
# au premier démarrage si la section minerals n'existe pas encore ici.
#
# ITEM BASIC :
#   type: item
#   namespace: itemsplus ou mineraisplus
#   id: identifiant_sans_espace
#   name: "Nom affiché"
#   texture: "cle_dans_item_texture_json"
#   creative: true  # false pour cacher l'item du créatif
#
# OUTILS : damage, durability, breaking_speed, harvest_level...
# ARMURES : slot, defense, durability, toughness...
#
# Après une modification des identifiants Customies, redémarre complètement le serveur.
# Créateur en jeu : /createitem (alias /itemcreator ou /icreate).
# Le type Minerai permet de créer le bloc et sa génération depuis la même interface.
# Le type Bloc normal crée un bloc solide qui redonne son propre bloc.
# La clé du bloc doit exister dans textures/terrain_texture.json du pack unique.

config-version: 6

# Les identifiants supprimés en jeu sont conservés ici pour empêcher
# le plugin de recréer automatiquement les items/minerais fournis par défaut.
